<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Services</title>

<style>
:root{
  --bg:#0b1220;
  --card:#121a2b;
  --card2:#16223a;
  --primary:#3b82f6;
  --primary-soft:#60a5fa;
  --danger:#ef4444;
  --text:#f1f5f9;
  --muted:#94a3b8;
}

body{
  margin:0;
  font-family:system-ui;
  background:var(--bg);
  color:var(--text);
}

.wrap{
  max-width:1100px;
  margin:auto;
  padding:18px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.leftSide{
  display:flex;
  align-items:center;
  gap:12px;
}

h2{margin:0;font-size:22px;}

.iconBtn{
  padding:7px 12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.1);
  background:transparent;
  color:var(--muted);
  cursor:pointer;
}

.iconBtn:hover{
  background:rgba(255,255,255,.05);
  color:white;
}

.rightSide{
  display:flex;
  align-items:center;
  gap:6px;
}

.depositBtn{
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;
  font-size:18px;
  cursor:pointer;
  background:linear-gradient(90deg,var(--primary),var(--primary-soft));
  color:white;
}

.balance{
  padding:8px 14px;
  border-radius:20px;
  background:rgba(59,130,246,.15);
  border:1px solid rgba(59,130,246,.4);
  color:var(--primary-soft);
  font-weight:600;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.tile{
  background:linear-gradient(145deg,var(--card),var(--card2));
  padding:20px;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.buyBtn{
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  background:linear-gradient(90deg,var(--primary),var(--primary-soft));
  color:white;
}

.resultWrapper{position:relative;}

#resultBadge{
  position:absolute;
  top:-6px;
  right:-6px;
  background:var(--danger);
  color:white;
  font-size:11px;
  padding:3px 7px;
  border-radius:50%;
  display:none;
}
</style>
</head>

<body>

<div class="wrap">

<div class="topbar">

  <div class="leftSide">
    <h2>Services</h2>

    <div class="resultWrapper">
      <button class="iconBtn"
              onclick="window.location='results.html'">
        📊 My Results
      </button>
      <span id="resultBadge"></span>
    </div>

    <button id="adminBtn"
            class="iconBtn"
            style="display:none;"
            onclick="window.location='admin.html'">
      🛠 Admin
    </button>
  </div>

  <div class="rightSide">
    <button class="depositBtn" onclick="createDeposit()">+</button>
    <div class="balance">
      <span id="balanceValue">0</span> UZS
    </div>
  </div>

</div>

<div class="cards" id="servicesContainer"></div>

</div>

<script>
const API_BASE="https://beckend-bot-1.onrender.com";
const token=localStorage.getItem("token");
if(!token) location.replace("index.html");

async function loadProfile(){
  const res=await fetch(API_BASE+"/api/user/me",{
    headers:{Authorization:"Bearer "+token}
  });
  const user=await res.json();
  balanceValue.innerText=user.balance;
  if(user.is_admin){
    adminBtn.style.display="inline-block";
  }
}

async function loadServices(){
  const res=await fetch(API_BASE+"/api/services",{
    headers:{Authorization:"Bearer "+token}
  });
  const services=await res.json();
  servicesContainer.innerHTML="";
  services.forEach(s=>{
    servicesContainer.innerHTML+=`
      <div class="tile">
        <div>
          <h3>${s.name}</h3>
          <p>${s.description||""}</p>
        </div>
        <button class="buyBtn"
        onclick="purchase(${s.id},${s.price},'${s.name}')">
        ${s.price} UZS
        </button>
      </div>`;
  });
}

async function purchase(id,price,name){
  if(!confirm("Buy "+name+"?"))return;
  const res=await fetch(API_BASE+"/api/services/purchase",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({service_id:id})
  });
  if(res.ok){
    alert("Purchased!");
    loadProfile();
    checkPending();
  }
}

async function checkPending(){
  const res=await fetch(API_BASE+"/api/results/my",{
    headers:{Authorization:"Bearer "+token}
  });
  const data=await res.json();
  const pending=data.filter(r=>r.status==="pending").length;
  if(pending>0){
    resultBadge.innerText=pending;
    resultBadge.style.display="block";
  }else{
    resultBadge.style.display="none";
  }
}

async function createDeposit(){
  const amount=prompt("Amount?");
  if(!amount)return;
  const res=await fetch(API_BASE+"/api/deposit/create",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer "+token
    },
    body:JSON.stringify({amount:Number(amount)})
  });
  const data=await res.json();
  await fetch(API_BASE+"/api/deposit/confirm/"+data.transaction_id,{method:"POST"});
  loadProfile();
}

loadProfile();
loadServices();
checkPending();
</script>
</body>
</html>
