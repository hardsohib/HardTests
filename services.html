<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Services</title>

<style>
:root{
  --bg:#0f172a;
  --card:#111827;
  --accent:#00f5a0;
  --accent2:#00d9ff;
  --text:#e6faff;
  --muted:rgba(230,250,255,.65);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto;
  background:
    radial-gradient(800px 500px at 70% 10%, rgba(0,245,160,.06), transparent 60%),
    radial-gradient(700px 500px at 20% 90%, rgba(0,217,255,.06), transparent 60%),
    var(--bg);
  color:var(--text);
  min-height:100vh;
}

.wrap{
  width:min(1200px,100%);
  margin:auto;
  padding:20px;
}

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
}

.balance{
  padding:10px 18px;
  border-radius:16px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#000;
  font-weight:900;
}

.cards{
  display:flex;
  gap:25px;
  flex-wrap:wrap;
}

.tile{
  flex:1 1 280px;
  background:var(--card);
  padding:20px;
  border-radius:22px;
  border:1px solid rgba(255,255,255,.08);
  transition:.25s;
}

.tile:hover{
  transform:translateY(-4px);
  box-shadow:0 25px 60px rgba(0,0,0,.5);
}

.title{
  font-size:20px;
  font-weight:900;
  margin-bottom:10px;
}

.sub{
  font-size:14px;
  color:var(--muted);
  margin-bottom:14px;
}

.buyBtn{
  padding:10px;
  border:none;
  border-radius:14px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:#000;
  width:100%;
}

.logout{
  cursor:pointer;
  font-size:14px;
  color:var(--muted);
}
</style>
</head>
<div style="position:relative; display:inline-block;">
  <button onclick="window.location='results.html'">
    📊 Check My Results
  </button>
  <span id="resultBadge"
        style="
          position:absolute;
          top:-5px;
          right:-5px;
          background:red;
          color:#fff;
          font-size:11px;
          padding:3px 7px;
          border-radius:50%;
          display:none;
        ">
  </span>
</div>
  Receive messages from admin
</label>
<body>

<div class="wrap">

  <div class="topbar"><button onclick="createDeposit()">Deposit</button>
    <button id="adminBtn"
        style="display:none;"
        onclick="window.location='admin.html'">
🛠 Admin Panel
</button>
    <button onclick="openReferral()">💰 Referral Earnings</button>
    <button onclick="copyReferral()">Invite & Earn 10%</button>
    <div>
      <h2>Services</h2>
     
    </div>
    <div class="balance">
      Balance: <span id="balanceValue">0</span> UZS
    </div>
  </div>

  <div class="cards" id="servicesContainer"></div>

</div>

<script>
const API_BASE = "https://beckend-bot-1.onrender.com";
const token = localStorage.getItem("token");

if(!token){
  window.location.replace("./index.html");
}

// ---------- Fetch Profile ----------
async function loadProfile(){
  const res = await fetch(API_BASE + "/api/user/me",{
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();

  document.getElementById("balanceValue").innerText =
    Number(data.balance).toLocaleString("en-US");

  // 🔥 SET CHECKBOX STATE

}
  async function copyReferral(){
  const res=await fetch(API_BASE+"/api/user/me",{
    headers:{Authorization:"Bearer "+token}
  });

  const user=await res.json();

  const link=`https://t.me/hard_tests_bot?start=${user.referral_code}`;

  navigator.clipboard.writeText(link);
  alert("Referral link copied!");
}

// ---------- Fetch Services ----------
async function loadServices(){
  const res = await fetch(API_BASE + "/api/services",{
    headers:{ Authorization:"Bearer " + token }
  });

  const services = await res.json();
  const container = document.getElementById("servicesContainer");
  container.innerHTML = "";

  services.forEach(service=>{
    const div = document.createElement("div");
    div.className = "tile";
    div.innerHTML = `
      <div class="title">${service.name}</div>
      <div class="sub">${service.description || ""}</div>
      <button class="buyBtn">
        ${Number(service.price).toLocaleString("en-US")} UZS
      </button>
    `;

    div.querySelector(".buyBtn").addEventListener("click",()=>{
      purchaseService(service);
    });

    container.appendChild(div);
  });
}

// ---------- Purchase ----------
async function purchaseService(service){

  if(service.requires_horizontal){
    if(window.innerHeight > window.innerWidth){
      alert("Please rotate your phone horizontally.");
      return;
    }
  }

  const confirmBuy = confirm(
    `Buy "${service.name}" for ${service.price} UZS?`
  );

  if(!confirmBuy) return;

  const res = await fetch(API_BASE + "/api/services/purchase",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + token
    },
    body:JSON.stringify({
      service_id: service.id
    })
  });

  const data = await res.json();

  if(res.ok){
    alert("Purchase successful!");
    loadProfile();
  }else{
    alert(data.message || "Not enough balance.");
  }
}

// ---------- Logout ----------


// ---------- Init ----------
loadProfile();
loadServices();
  async function createDeposit(){

  const amount = prompt("Enter deposit amount (UZS)");

  if(!amount) return;

  const res = await fetch(API_BASE + "/api/deposit/create",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + token
    },
    body:JSON.stringify({
      amount:Number(amount)
    })
  });

  const data = await res.json();

  if(res.ok){
    alert("Deposit created (test mode). Now confirming...");
    
    // Simulate payment success
    await fetch(API_BASE + "/api/deposit/confirm/" + data.transaction_id,{
      method:"POST"
    });

    alert("Deposit confirmed!");
    loadProfile();
  }else{
    alert(data.message);
  }
}
  async function checkPendingResults(){
  const res = await fetch(API_BASE + "/api/results/my",{
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();

  const pendingCount = data.filter(r=>r.status==="pending").length;

  const badge = document.getElementById("resultBadge");

  if(pendingCount > 0){
    badge.innerText = pendingCount;
    badge.style.display = "block";
  }else{
    badge.style.display = "none";
  }
}

  async function loadResults(){

  const res = await fetch(API_BASE + "/api/results/my",{
    headers:{
      Authorization:"Bearer " + token
    }
  });

  const data = await res.json();

  if(data.length === 0){
    alert("No results yet.");
    return;
  }

  let message = "Your Results:\n\n";

  data.forEach(r=>{
    message += `${r.name}\nScore: ${r.score}\n${r.feedback}\n\n`;
  });

  alert(message);
}
async function loadUser(){
  const res = await fetch(API_BASE + "/api/user/me",{
    headers:{ Authorization:"Bearer " + token }
  });

  const user = await res.json();

  if(user.is_admin){
    document.getElementById("adminBtn").style.display = "inline-block";
  }
}
  loadUser();
  loadProfile();
loadServices();
checkPendingResults();
</script>

</body>
</html>
