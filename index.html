<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
:root{
  --bg1:#0f172a;
  --bg2:#0b1220;
  --card:#111827;
  --accent:#00f5a0;
  --accent2:#00d9ff;
  --text:#e5f6ff;
  --muted:rgba(229,246,255,.65);
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,Segoe UI,Roboto,Arial;
  background:
    radial-gradient(800px 500px at 80% 10%, rgba(0,245,160,.08), transparent 60%),
    radial-gradient(700px 500px at 10% 90%, rgba(0,217,255,.08), transparent 60%),
    var(--bg1);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  width:min(420px,92vw);
  background:linear-gradient(180deg,var(--card),#0b1220);
  border-radius:22px;
  padding:28px;
  text-align:center;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 25px 60px rgba(0,0,0,.6);
}

.logo{
  font-size:28px;
  font-weight:900;
  margin-bottom:8px;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  font-size:14px;
  color:var(--muted);
  margin-bottom:24px;
}

.loader{
  width:42px;
  height:42px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,.1);
  border-top:4px solid var(--accent);
  margin:0 auto 18px;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

.status{
  font-size:14px;
  color:var(--muted);
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">Sohib Services</div>
  <div class="subtitle">Secure Telegram Login</div>
  <div class="loader"></div>
  <div class="status" id="statusText">Authenticating...</div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script>
const API_BASE = "https://beckend-bot-1.onrender.com";

async function authenticate(){
  const tg = window.Telegram.WebApp;
  tg.expand();

  if(!tg.initData){
    document.getElementById("statusText").innerText =
      "Please open inside Telegram.";
    return;
  }

  try{
    const response = await fetch(API_BASE + "/api/auth/telegram",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        initData: tg.initData
      })
    });

    if(!response.ok) throw new Error("Auth failed");

    const data = await response.json();

    // Save JWT token securely
    localStorage.setItem("token", data.token);

    // Redirect to services
    window.location.replace("./services.html");

  }catch(err){
    document.getElementById("statusText").innerText =
      "Authentication failed. Try again.";
  }
}

authenticate();
</script>

</body>

</html>
