<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>My Results</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

.card{
  background:#111827;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,.08);
}

.score{
  font-size:32px;
  font-weight:900;
  color:#00f5a0;
}

.date{
  font-size:12px;
  opacity:.6;
  margin-bottom:10px;
}
</style>
</head>

<body>

<h2>📊 My Results</h2>
<div id="resultsContainer"></div>

<script>
const API_BASE = "https://your-backend.onrender.com";
const token = localStorage.getItem("token");

async function loadResults(){
  const res = await fetch(API_BASE + "/api/results/my",{
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();
  const container = document.getElementById("resultsContainer");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = "<p>No results yet.</p>";
    return;
  }

  data.forEach(r=>{
    container.innerHTML += `
      <div class="card">
        <div class="date">${new Date(r.created_at).toLocaleString()}</div>
        <div><b>${r.name}</b></div>
        <div class="score">Band ${r.score}</div>
        <p>${r.feedback}</p>
      </div>
    `;
  });
}

loadResults();
</script>

</body>
</html>
