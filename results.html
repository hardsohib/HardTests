<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>My Results</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h2{margin-bottom:20px;}

.resultCard{
  background:#111827;
  padding:18px;
  border-radius:20px;
  margin-bottom:15px;
  cursor:pointer;
  transition:.25s;
  border:1px solid rgba(255,255,255,.08);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.resultCard:hover{
  transform:translateY(-4px);
}

.status{
  padding:6px 14px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.pending{
  background:#ffb020;
  color:#000;
}

.completed{
  background:#00f5a0;
  color:#000;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modalContent{
  background:#111827;
  padding:30px;
  border-radius:24px;
  width:90%;
  max-width:400px;
  text-align:center;
  animation:fade .3s ease;
}

@keyframes fade{
  from{opacity:0; transform:scale(.9);}
  to{opacity:1; transform:scale(1);}
}

.circle{
  width:120px;
  height:120px;
  border-radius:50%;
  margin:20px auto;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:900;
  background:conic-gradient(#00f5a0 calc(var(--percent)*1%), #1f2937 0%);
}

.feedback{
  font-size:14px;
  opacity:.8;
  margin-top:10px;
}
</style>
</head>

<body>
<button onclick="goBack()">⬅ Back</button>
<h2>📊 My Results</h2>

<div id="container"></div>

<div class="modal" id="modal">
  <div class="modalContent" id="modalContent"></div>
</div>

<script>
const API_BASE="https://beckend-bot-1.onrender.com";
const token=localStorage.getItem("token");

let allResults=[];

async function load(){
  const res=await fetch(API_BASE+"/api/results/my",{
    headers:{Authorization:"Bearer "+token}
  });

  const data=await res.json();
  allResults=data;

  const container=document.getElementById("container");
  container.innerHTML="";

  if(data.length===0){
    container.innerHTML="<p>No results yet.</p>";
    return;
  }

  data.forEach(r=>{
    container.innerHTML+=`
      <div class="resultCard" onclick="openResult(${r.id})">
        <div>${r.name}</div>
        <div class="status ${r.status}">
          ${r.status}
        </div>
      </div>
    `;
  });
}
function goBack(){
  window.location = "services.html";
}
function openResult(id){
  const r=allResults.find(x=>x.id===id);

  if(r.status==="pending"){
    document.getElementById("modalContent").innerHTML=
      "<h3>⏳ Being checked</h3>";
  }else{
    const percent=(r.score/9)*100;

    document.getElementById("modalContent").innerHTML=`
      <h3>${r.name}</h3>
      <div class="circle" style="--percent:${percent}">
        ${r.score}
      </div>
      <div class="feedback">${r.feedback}</div>
      <br>
      <button onclick="closeModal()">Close</button>
    `;
  }

  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

load();
</script>

</body>
</html>
