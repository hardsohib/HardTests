<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#0f172a;
color:white;
font-family:system-ui;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

textarea{
width:100%;
min-height:140px;
border:none;
border-radius:8px;
padding:10px;
margin-top:10px;
background:#0f172a;
color:white;
}

.preview{
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

.counter{
font-size:13px;
opacity:.7;
margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Writing Test</h2>

<div class="card">

<label>Essay Topic</label>

<textarea id="topicText"></textarea>

<label>Or Upload Topic Photo</label>

<input type="file" id="topicImage">

<div id="topicPreview" class="preview"></div>

</div>

<div class="card">

<label>Your Essay</label>

<textarea id="essayText"></textarea>

<div class="counter">
Words: <span id="wordCount">0</span>
</div>

<label>Upload Essay Photos</label>

<input type="file" id="essayImages" multiple>

<div id="essayPreview" class="preview"></div>

</div>

<button onclick="submitEssay()">
Submit Essay
</button>

</div>

<script>

const API_BASE="https://beckend-bot-1.onrender.com";
const token=localStorage.getItem("token");

const params=new URLSearchParams(window.location.search);
const RESULT_ID=params.get("result_id");

essayText.oninput=()=>{
 const words=essayText.value.trim().split(/\s+/).filter(Boolean);
 wordCount.innerText=words.length;
};

function preview(input,box){

box.innerHTML="";

[...input.files].forEach(file=>{

 const reader=new FileReader();

 reader.onload=e=>{
   const img=document.createElement("img");
   img.src=e.target.result;
   box.appendChild(img);
 };

 reader.readAsDataURL(file);

});

}

topicImage.onchange=()=>preview(topicImage,topicPreview);
essayImages.onchange=()=>preview(essayImages,essayPreview);

async function submitEssay(){

 const formData=new FormData();

 formData.append("result_id",RESULT_ID);
 formData.append("topic_text",topicText.value);
 formData.append("essay_text",essayText.value);

 if(topicImage.files[0]){
  formData.append("topic_image",topicImage.files[0]);
 }

 [...essayImages.files].forEach(file=>{
  formData.append("essay_images",file);
 });

 const res=await fetch(API_BASE+"/api/results/submit-writing",{
  method:"POST",
  headers:{
   Authorization:"Bearer "+token
  },
  body:formData
 });

 if(res.ok){
  alert("Submitted!");
  window.location="services.html";
 }else{
  alert("Submission failed");
 }

}

</script>

</body>
</html>
