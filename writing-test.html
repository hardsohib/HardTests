<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
background:#0f172a;
color:white;
font-family:system-ui;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

textarea{
width:100%;
min-height:140px;
border:none;
border-radius:8px;
padding:10px;
margin-top:10px;
background:#0f172a;
color:white;
}

.preview{
display:grid;
grid-template-columns:repeat(auto-fill,90px);
gap:10px;
margin-top:10px;
}

.preview img{
width:90px;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin-top:20px;
}

button:disabled{
opacity:.6;
cursor:not-allowed;
}

.counter{
font-size:13px;
opacity:.7;
margin-top:5px;
}

</style>

</head>

<body>

<div class="container">

<h2>Writing Test</h2>

<div class="card">

<label>Essay Topic</label>
<textarea id="topicText"></textarea>

<label>Or Upload Topic Photo</label>
<input type="file" id="topicImage">

<div id="topicPreview" class="preview"></div>

</div>


<div class="card">

<label>Your Essay</label>
<textarea id="essayText"></textarea>

<div class="counter">
Words: <span id="wordCount">0</span>
</div>

<label>Upload Essay Photos</label>
<input type="file" id="essayImages" multiple>

<div id="essayPreview" class="preview"></div>

</div>


<button id="submitBtn" onclick="submitEssay()">
Submit Essay
</button>

</div>


<script>

const API_BASE="https://beckend-bot-1.onrender.com";
const token=localStorage.getItem("token");

const params = new URLSearchParams(window.location.search);
const RESULT_ID = params.get("result_id");

if(!token){
 window.location="index.html";
}

if(!RESULT_ID){
 alert("Result ID missing");
 window.location="services.html";
}

/* DOM */

const topicText = document.getElementById("topicText");
const essayText = document.getElementById("essayText");
const topicImage = document.getElementById("topicImage");
const essayImages = document.getElementById("essayImages");

const topicPreview = document.getElementById("topicPreview");
const essayPreview = document.getElementById("essayPreview");

const wordCount = document.getElementById("wordCount");
const submitBtn = document.getElementById("submitBtn");


/* Word Counter */

essayText.addEventListener("input", ()=>{

 const words = essayText.value
  .trim()
  .split(/\s+/)
  .filter(Boolean);

 wordCount.innerText = words.length;

});


/* Image Preview */

function preview(input, box){

 box.innerHTML="";

 [...input.files].forEach(file=>{

  const reader = new FileReader();

  reader.onload = e => {

   const img = document.createElement("img");
   img.src = e.target.result;

   box.appendChild(img);

  };

  reader.readAsDataURL(file);

 });

}

topicImage.onchange = () => preview(topicImage, topicPreview);
essayImages.onchange = () => preview(essayImages, essayPreview);


/* Submit Essay */

async function submitEssay(){

 submitBtn.disabled = true;
 submitBtn.innerText = "Submitting...";

 const formData = new FormData();

 formData.append("result_id", RESULT_ID);
 formData.append("topic_text", topicText.value);
 formData.append("essay_text", essayText.value);

 if(topicImage.files.length > 0){
  formData.append("topic_image", topicImage.files[0]);
 }

 for(const file of essayImages.files){
  formData.append("essay_images", file);
 }

 try{

  const res = await fetch(API_BASE + "/api/results/submit-writing",{
   method:"POST",
   headers:{
    Authorization:"Bearer " + token
   },
   body:formData
  });

  const data = await res.json();

  if(!res.ok){
   alert(data.message || "Submission failed");
   submitBtn.disabled = false;
   submitBtn.innerText = "Submit Essay";
   return;
  }

  alert("✅ Essay submitted successfully!");

  window.location = "services.html";

 }catch(err){

  console.error(err);

  alert("Network error");

  submitBtn.disabled = false;
  submitBtn.innerText = "Submit Essay";

 }

}

</script>

</body>
</html>
