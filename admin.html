<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h2{margin-bottom:20px;}

.card{
  background:#111827;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.08);
}

input, textarea{
  width:100%;
  padding:8px;
  margin-top:6px;
  margin-bottom:10px;
  border-radius:8px;
  border:none;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#00f5a0;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>🛠 Admin Dashboard</h2>

<div id="pendingContainer"></div>

<script>
const API_BASE = "https://your-backend.onrender.com";
const token = localStorage.getItem("token");

async function loadPending(){
  const res = await fetch(API_BASE + "/api/results/admin/pending",{
    headers:{ Authorization:"Bearer " + token }
  });

  const data = await res.json();
  const container = document.getElementById("pendingContainer");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = "<p>No pending tests.</p>";
    return;
  }

  data.forEach(item=>{
    container.innerHTML += `
      <div class="card">
        <b>User:</b> ${item.username}<br>
        <b>Service:</b> ${item.name}<br>

        <input placeholder="Score (example 7.5)" id="score-${item.id}">
        <textarea placeholder="Feedback..." id="feedback-${item.id}"></textarea>

        <button onclick="submitResult(${item.id}, ${item.user_id}, ${item.service_id})">
          Submit Result
        </button>
      </div>
    `;
  });
}

async function submitResult(resultId, userId, serviceId){

  const score = document.getElementById("score-"+resultId).value;
  const feedback = document.getElementById("feedback-"+resultId).value;

  await fetch(API_BASE + "/api/results/admin/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + token
    },
    body:JSON.stringify({
      user_id:userId,
      service_id:serviceId,
      score,
      feedback
    })
  });

  alert("Result sent!");
  loadPending();
}

loadPending();
</script>

</body>
</html>
