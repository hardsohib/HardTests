<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b1220;
  color:#f1f5f9;
}

.wrap{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

h2{
  margin:0 0 20px 0;
  position:relative;
  display:inline-block;
}

#adminBadge{
  position:absolute;
  top:-5px;
  right:-20px;
  background:#ef4444;
  color:white;
  font-size:11px;
  padding:3px 7px;
  border-radius:50%;
  display:none;
}

.card{
  background:#16223a;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#3b82f6;
  color:white;
}
</style>
</head>

<body>

<div class="wrap">

<h2>
Admin Panel
<span id="adminBadge"></span>
</h2>

<div id="pendingContainer"></div>

</div>

<script>
const API_BASE="https://beckend-bot-1.onrender.com";
const token=localStorage.getItem("token");

async function loadPending(){
  const res=await fetch(API_BASE+"/api/results/admin/pending",{
    headers:{Authorization:"Bearer "+token}
  });
  const data=await res.json();

  pendingContainer.innerHTML="";
  if(data.length>0){
    adminBadge.innerText=data.length;
    adminBadge.style.display="block";
  }else{
    adminBadge.style.display="none";
  }

  data.forEach(r=>{
    pendingContainer.innerHTML+=`
      <div class="card">
        <b>${r.username}</b><br>
        ${r.name}<br><br>
        <button onclick="complete(${r.id})">
        Mark Completed
        </button>
      </div>`;
  });
}

async function complete(id){
  await fetch(API_BASE+"/api/results/admin/complete/"+id,{
    method:"POST",
    headers:{Authorization:"Bearer "+token}
  });
  loadPending();
}

loadPending();
setInterval(loadPending,5000);
</script>
</body>
</html>
