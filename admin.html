<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#fff;
  padding:20px;
}

h2{
  margin-bottom:20px;
}

.card{
  background:#111827;
  border-radius:16px;
  padding:16px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.08);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-3px);
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:14px;
}

textarea{
  resize:none;
  height:80px;
}

button{
  padding:10px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:#00f5a0;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  transform:scale(1.05);
}

.empty{
  opacity:0.7;
  margin-top:20px;
}
</style>
</head>

<body>

<h2>🛠 Admin Dashboard</h2>

<div id="pendingContainer"></div>

<script>
const API_BASE = "https://beckend-bot-1.onrender.com"; // change if needed
const token = localStorage.getItem("token");

// 🔒 Require login
if(!token){
  window.location = "index.html";
}

async function loadPending(){

  const res = await fetch(API_BASE + "/api/results/admin/pending",{
    headers:{ Authorization:"Bearer " + token }
  });

  if(!res.ok){
    const err = await res.json();
    alert(err.message);
    return;
  }

  const data = await res.json();
  const container = document.getElementById("pendingContainer");
  container.innerHTML = "";

  if(data.length === 0){
    container.innerHTML = "<div class='empty'>No pending tests.</div>";
    return;
  }

  data.forEach(item=>{
    container.innerHTML += `
      <div class="card">
        <b>User:</b> ${item.username}<br>
        <b>Service:</b> ${item.name}<br>

        <input placeholder="Score (example 7.5)" id="score-${item.id}">
        <textarea placeholder="Feedback..." id="feedback-${item.id}"></textarea>

        <button onclick="submitResult(${item.id}, ${item.user_id}, ${item.service_id})">
          Submit Result
        </button>
      </div>
    `;
  });
}

async function submitResult(resultId, userId, serviceId){

  const score = document.getElementById("score-"+resultId).value;
  const feedback = document.getElementById("feedback-"+resultId).value;

  if(!score || !feedback){
    alert("Score and feedback required");
    return;
  }

  const res = await fetch(API_BASE + "/api/results/admin/add",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:"Bearer " + token
    },
    body:JSON.stringify({
      user_id:userId,
      service_id:serviceId,
      score,
      feedback
    })
  });

  if(!res.ok){
    const err = await res.json();
    alert(err.message);
    return;
  }

  alert("✅ Result sent successfully!");
  loadPending();
}

loadPending();
</script>

</body>
</html>
